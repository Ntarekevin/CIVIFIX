server {
    listen 80;
    server_name civifix.rw www.civifix.rw;

    # Redirect HTTP to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name civifix.rw www.civifix.rw;

    # SSL Certificates (managed by Certbot)
    ssl_certificate /etc/letsencrypt/live/civifix.rw/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/civifix.rw/privkey.pem;

    # Security Headers
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-XSS-Protection "1; mode=block";
    add_header X-Content-Type-Options "nosniff";
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Root directory for Frontend React App
    root /var/www/civifix/frontend/dist;
    index index.html;

    # Frontend Routing (SPA fallback)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API requests to Node.js / Express Backend
    location /api/ {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        
        # Pass real client IP to backend for auditing
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Proxy Socket.io specifically
    location /socket.io/ {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
    }
}
